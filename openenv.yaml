name: VoiceClinicAgent
version: "0.1.0"
description: "OpenEnv-compatible RL environment for evaluating autonomous clinic appointment booking agents under privacy, uncertainty, and resource contention"

endpoints:
  health: 
    method: GET
    path: /health
    description: "Health check endpoint"
  
  reset:
    method: POST
    path: /reset
    description: "Initialize new episode"
    request_schema:
      task_id: string
      seed: integer (optional)
    response_schema:
      episode_id: string
      observation: object
  
  step:
    method: POST
    path: /step
    description: "Execute one environment step"
    request_schema:
      action: object
    response_schema:
      observation: object
      reward: float
      done: boolean
  
  state:
    method: GET
    path: /state
    description: "Get current episode state including final score when complete"
    response_schema:
      episode_id: string
      task_id: string
      step_count: integer
      max_turns: integer
      cumulative_reward: float
      termination_reason: string (optional)
      final_score: float (optional, present when done=true)
      booking_confirmed: boolean
      escalated_urgent: boolean
      escalated_human: boolean
      grade_report: object (optional, present when done=true)

tasks:
  - task_id: easy_001
    level: easy
    description: "Adult patient, clear symptoms, English only, straightforward booking"
    max_turns: 15
  
  - task_id: medium_001
    level: medium
    description: "Parent booking for child, mild vagueness, admin check, doctor delay, optional Hindi-English"
    max_turns: 20
  
  - task_id: hard_001
    level: hard
    description: "Limited slots, urgent walk-in, conflicting info, mixed Hindi-English, privacy-sensitive"
    max_turns: 25

action_schema:
  action_type:
    type: enum
    values:
      - ask_question
      - offer_slot
      - confirm_booking
      - escalate_urgent
      - escalate_human
      - query_availability
      - check_insurance
      - trigger_reflection
      - store_memory_safe
      - recall_memory
      - end_call
  payload:
    type: object
    description: "Action-specific parameters"
    examples:
      ask_question: "{question_type: 'symptoms', question_text: 'What symptoms are you experiencing?'}"
      offer_slot: "{slot_id: 'ped_2026-04-03_16:00_sharma'}"
      confirm_booking: "{slot_id: 'ped_2026-04-03_16:00_sharma', patient_confirmation: true}"
      store_memory_safe: "{memory_key: 'language_preference', value: 'hi_en'}"
      recall_memory: "{memory_key: 'language_preference'}"

observation_schema:
  task_level:
    type: enum
    values: [easy, medium, hard]
  turn_idx:
    type: integer
    description: "Current turn number (0-indexed)"
  max_turns:
    type: integer
    description: "Maximum turns for this episode"
  patient_message:
    type: string
    description: "Current patient response text"
  conversation_summary:
    type: string
    description: "Brief summary of conversation so far"
  patient_flags:
    type: object
    fields:
      parent_booking: integer (0 or 1)
      language_mix: float (0.0 to 1.0)
      vague_symptoms: integer (0 or 1)
      urgency_score_hint: float (0.0 to 1.0)
      insurance_status_known: integer (0 or 1)
      duplicate_info_flag: integer (0 or 1)
  clinic_state:
    type: object
    fields:
      available_slots: "object (department -> list of slot_ids)"
      doctor_delay_minutes: integer
      urgent_queue_length: integer
  reflection_token:
    type: array
    length: 4
    description: "[need_escalation, info_missing, privacy_risk_high, slot_pressure]"
    element_type: float (0.0 to 1.0)
  memory_vault_summary:
    type: object
    description: "Stored safe preferences (presence flags only)"
  privacy_risk_mask:
    type: object
    description: "PII field names with risk flags (0 or 1)"

grading:
  method: deterministic
  final_score_range: [0.0, 1.0]
  components:
    booking_success:
      weight: 0.30
      description: "Booking confirmed, efficiency, correct department"
    privacy_compliance:
      weight: 0.25
      description: "No PII violations, safe memory usage"
    escalation_correctness:
      weight: 0.20
      description: "Correct escalation decisions and timing"
    coordination:
      weight: 0.15
      description: "Availability queries, duplicate checks, slot pressure handling"
    reflection_quality:
      weight: 0.10
      description: "Effective use of reflection for plan revision"
  
  termination:
    done_conditions:
      - "Booking confirmed successfully"
      - "Escalated to urgent queue"
      - "Escalated to human operator"
      - "Hard privacy violation (blocked PII access)"
    truncated_conditions:
      - "Maximum turns exceeded"
      - "Patient frustration >= 1.0 (hung up)"

privacy:
  allowed_memory_keys:
    - language_preference
    - slot_preference_time
    - slot_preference_day
    - preferred_department
    - returning_patient
  
  blocked_pii_keys:
    - name
    - phone
    - phone_number
    - aadhaar
    - aadhaar_number
    - address
    - insurance_id
    - insurance_number
    - email
    - date_of_birth
    - dob
  
  enforcement:
    blocked_key_access: "Hard termination (done=true, final_score heavily penalized)"
    conversation_pii: "Negative reward, episode continues"

performance:
  runtime_limit: "20 minutes for all tasks on 2 vCPU / 8GB RAM"
  memory_limit: "8GB RAM"
  concurrent_episodes: 10
